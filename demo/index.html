<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Photo Frame Demo</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #050505; color: #fff; }
    * { box-sizing: border-box; }
    html, body, main { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    main { position: relative; background: #050505; }
    .backdrop {
      position: absolute;
      inset: -5%;
      background: center/cover no-repeat;
      filter: blur(24px);
      opacity: 0;
      transform: scale(1.08);
      transition: opacity 1200ms ease;
    }
    .backdrop.visible { opacity: 0.52; }
    .shade { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, rgba(0,0,0,.42)); }
    img {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      opacity: 0;
      transition: opacity 1200ms ease;
    }
    img.visible { opacity: 1; }
    .clock {
      position: absolute;
      top: 18px;
      right: 18px;
      min-width: 150px;
      padding: 12px 15px;
      border-radius: 8px;
      background: rgba(0,0,0,.25);
      text-align: right;
      text-shadow: 0 1px 12px rgba(0,0,0,.8);
    }
    .time { font-size: 46px; font-weight: 750; line-height: 1; }
    .date { margin-top: 7px; font-size: 18px; font-weight: 650; }
    .label {
      position: absolute;
      left: 18px;
      bottom: 18px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0,0,0,.3);
      color: rgba(255,255,255,.84);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div id="backdropA" class="backdrop visible"></div>
    <div id="backdropB" class="backdrop"></div>
    <div class="shade"></div>
    <img id="photoA" class="visible" alt="">
    <img id="photoB" alt="">
    <div class="clock"><div id="time" class="time"></div><div id="date" class="date"></div></div>
    <div class="label">Web Photo Frame demo / sample images</div>
  </main>
  <script>
    const samplePhotos = [
      "sample-photos/baby-mat.png",
      "sample-photos/family-dinner.png",
      "sample-photos/family-lake-walk.png",
    ];
    const photos = [document.getElementById("photoA"), document.getElementById("photoB")];
    const backdrops = [document.getElementById("backdropA"), document.getElementById("backdropB")];
    let index = 0;
    let layer = 0;
    function renderClock() {
      const now = new Date();
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
      document.getElementById("time").textContent = now.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
      document.getElementById("date").textContent = `${now.getMonth() + 1}/${now.getDate()} (${weekdays[now.getDay()]})`;
    }
    function show(next) {
      index = next % samplePhotos.length;
      const url = samplePhotos[index];
      const nextLayer = 1 - layer;
      photos[nextLayer].src = url;
      backdrops[nextLayer].style.backgroundImage = `url("${url}")`;
      photos[nextLayer].classList.add("visible");
      backdrops[nextLayer].classList.add("visible");
      photos[layer].classList.remove("visible");
      backdrops[layer].classList.remove("visible");
      layer = nextLayer;
    }
    photos[0].src = samplePhotos[0];
    backdrops[0].style.backgroundImage = `url("${samplePhotos[0]}")`;
    renderClock();
    setInterval(renderClock, 1000);
    setInterval(() => show(index + 1), 3500);
    document.body.addEventListener("click", () => show(index + 1));
  </script>
</body>
</html>
